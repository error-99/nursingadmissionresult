<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BNMC Result Checker</title>

<style>

/* ===== RESET ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui,-apple-system,Segoe UI,Roboto;
}

body{
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

/* ===== CONTAINER ===== */
.container{
  width:95%;
  max-width:520px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  border-radius:18px;
  padding:30px;
  box-shadow:0 15px 40px rgba(0,0,0,.4);
  text-align:center;
}

/* ===== TITLE ===== */
h1{
  margin-bottom:20px;
  font-weight:600;
}

/* ===== INPUT ===== */
.input-group{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:16px;
  outline:none;
}

/* ===== BUTTON ===== */
button{
  padding:14px 18px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

button:hover{
  background:#0072ff;
}

/* ===== RESULT CARD ===== */
.result{
  margin-top:25px;
  text-align:left;
}

.card{
  background:rgba(255,255,255,0.1);
  border-radius:14px;
  padding:20px;
  animation:fade .5s ease;
}

.card h2{
  text-align:center;
  margin-bottom:10px;
}

.card p{
  margin:6px 0;
  font-size:15px;
}

/* PHOTO */
.photo{
  display:flex;
  justify-content:center;
  margin-top:15px;
}

.photo img{
  width:130px;
  border-radius:10px;
  border:3px solid white;
}

/* ===== LOADER ===== */
.loader{
  margin-top:20px;
  display:none;
}

.spinner{
  width:35px;
  height:35px;
  border:4px solid rgba(255,255,255,.3);
  border-top:4px solid white;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:auto;
}

/* ===== ANIMATION ===== */
@keyframes spin{
  100%{transform:rotate(360deg);}
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.error{
  color:#ffb3b3;
  text-align:center;
  margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

  <h1>🎓 BNMC Result Checker</h1>

  <div class="input-group">
    <input id="roll" placeholder="Enter Roll Number">
    <button onclick="checkResult()">Search</button>
  </div>

  <div class="loader" id="loader">
    <div class="spinner"></div>
  </div>

  <div class="result" id="result"></div>

</div>

<script>

async function checkResult(){

  const roll = document.getElementById("roll").value.trim();
  const resultDiv = document.getElementById("result");
  const loader = document.getElementById("loader");

  if(!roll){
    resultDiv.innerHTML='<p class="error">Enter roll number</p>';
    return;
  }

  resultDiv.innerHTML="";
  loader.style.display="block";

  try{

    const res = await fetch(`/api/result?roll=${roll}`);
    const data = await res.json();

    loader.style.display="none";

    if(!data.status){
      resultDiv.innerHTML=`<p class="error">Result not found</p>`;
      return;
    }

    resultDiv.innerHTML=`
      <div class="card">
        <h2>${data.name}</h2>

        <p><b>Roll:</b> ${data.roll}</p>
        <p><b>Course:</b> ${data.course}</p>
        <p><b>Merit Position:</b> ${data.merit_position}</p>
        <p><b>Test Score:</b> ${data.test_score}</p>
        <p><b>Merit Score:</b> ${data.merit_score}</p>
        <p><b>College Code:</b> ${data.college_code}</p>
        <p><b>College Name:</b> ${data.college_name}</p>
        <p><b>Status:</b> ${data.result_status}</p>

        ${
          data.photo
          ? `<div class="photo"><img src="${data.photo}"></div>`
          : ""
        }
      </div>
    `;

  }catch(err){
    loader.style.display="none";
    resultDiv.innerHTML=`<p class="error">Server error</p>`;
  }
}

</script>

</body>
</html>
